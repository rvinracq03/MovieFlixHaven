<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movieflixhaven Redirect</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            /* Using black as fallback, ensure hero-background1.jpg is in the same folder */
            background: #141414 url('hero-background1.jpg') no-repeat center center/cover;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #message {
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0px 0px 25px rgba(255, 0, 0, 0.9);
        }

        /* Immediate Click Button Style */
        .watch-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            box-shadow: 0px 5px 20px rgba(255, 95, 109, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .watch-btn:hover {
            transform: scale(1.1);
            box-shadow: 0px 10px 30px rgba(255, 95, 109, 0.6);
            background: linear-gradient(135deg, #ff5f6d, #ff9a8b);
        }

        .watch-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="message">Watch Movies For Free</div>
        
        <a class="watch-btn" 
           href="https://moviebox.ph/" 
           onclick="window.open('https://cutt.ly/qtYAsU9G', '_blank');">
            WATCH NOW
        </a>
    </div>

</body>
</html>
